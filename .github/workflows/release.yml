name: Release

on:
  push:
    tags:
      - "v[0-9]*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-15

    steps:
      - name: Check out source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Select Xcode 16.4
        run: |
          sudo xcode-select --switch /Applications/Xcode_16.4.app/Contents/Developer
          xcodebuild -version
          swift --version

      - name: Derive version from tag
        id: version
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          if [[ ! "$version" =~ ^[0-9]+([.][0-9]+)*$ ]]; then
            echo "Tag must have the form v1.2.3" >&2
            exit 2
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Run all tests
        run: swift test

      - name: Build signed app archive
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: ./bundle.sh release

      - name: Verify archive
        id: archive
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          archive="build/NotchApp-${VERSION}.zip"
          test -f "$archive"
          test "$(plutil -extract CFBundleShortVersionString raw build/NotchApp.app/Contents/Info.plist)" = "$VERSION"
          if plutil -extract NotchAgentSourcePath raw build/NotchApp.app/Contents/Info.plist >/dev/null 2>&1; then
            echo "Release bundle must not contain NotchAgentSourcePath" >&2
            exit 1
          fi
          codesign --verify --deep --strict --verbose=2 build/NotchApp.app
          ditto -x -k "$archive" "$RUNNER_TEMP/notchagent-archive-check"
          codesign --verify --deep --strict --verbose=2 "$RUNNER_TEMP/notchagent-archive-check/NotchApp.app"
          sha256="$(shasum -a 256 "$archive" | awk '{print $1}')"
          echo "sha256=$sha256" >> "$GITHUB_OUTPUT"
          echo "Archive SHA-256: $sha256"

      # The running app polls this asset through the stable
      # `releases/latest/download/appcast.json` redirect to learn that a newer
      # version exists. Keep the schema in sync with Sources/NotchApp/Updates/UpdateManifest.swift.
      - name: Generate update manifest
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
          SHA256: ${{ steps.archive.outputs.sha256 }}
        run: |
          minimum="$(plutil -extract LSMinimumSystemVersion raw build/NotchApp.app/Contents/Info.plist)"
          cat > build/appcast.json <<JSON
          {
            "schemaVersion": 1,
            "version": "${VERSION}",
            "publishedAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "minimumSystemVersion": "${minimum}",
            "downloadURL": "https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/NotchApp-${VERSION}.zip",
            "sha256": "${SHA256}",
            "releaseNotesURL": "https://github.com/${GITHUB_REPOSITORY}/releases/tag/${GITHUB_REF_NAME}"
          }
          JSON
          python3 -c 'import json; json.load(open("build/appcast.json"))'
          cat build/appcast.json

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          archive="build/NotchApp-${VERSION}.zip"
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "$archive" build/appcast.json --clobber
          else
            gh release create "$GITHUB_REF_NAME" "$archive" build/appcast.json \
              --verify-tag \
              --generate-notes \
              --title "NotchAgent ${VERSION}"
          fi

      - name: Check out Homebrew tap
        uses: actions/checkout@v6
        with:
          repository: ykushch/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update Homebrew cask
        env:
          VERSION: ${{ steps.version.outputs.version }}
          SHA256: ${{ steps.archive.outputs.sha256 }}
        shell: bash
        run: |
          cask="homebrew-tap/Casks/notchagent.rb"
          ruby - "$cask" "$VERSION" "$SHA256" <<'RUBY'
          path, version, sha256 = ARGV
          content = File.read(path)
          abort "version stanza not found" unless content.sub!(/^  version ".*"$/, "  version \"#{version}\"")
          abort "sha256 stanza not found" unless content.sub!(/^  sha256 ".*"$/, "  sha256 \"#{sha256}\"")
          File.write(path, content)
          RUBY
          git -C homebrew-tap diff --check

      - name: Push Homebrew cask update
        env:
          VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          if git -C homebrew-tap diff --quiet; then
            echo "Homebrew cask is already at ${VERSION}"
            exit 0
          fi
          git -C homebrew-tap config user.name "github-actions[bot]"
          git -C homebrew-tap config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C homebrew-tap add Casks/notchagent.rb
          git -C homebrew-tap commit -m "Update NotchAgent to ${VERSION}"
          git -C homebrew-tap push origin HEAD:main
